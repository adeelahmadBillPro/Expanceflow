[phases.setup]
nixPkgs = ["...", "nodejs_22"]

[phases.install]
cmds = [
  "cd client && npm install",
  "cd server && npm install"
]

[phases.build]
cmds = [
  "cd client && npm run build",
  "cd server && npx prisma generate",
  "cp -r client/dist server/public"
]

[start]
cmd = "cd server && npx prisma db push --accept-data-loss && node prisma/seed.js; node src/index.js"
