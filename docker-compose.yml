version: '3.8'

services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: expense_tracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StrongPassword123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-StrongPassword123}@db:5432/expense_tracker_db
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-string-in-production}
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      NODE_ENV: production
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/server/uploads

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  pgdata:
  uploads:
