databases:
  - name: expenseflow-db
    plan: free
    databaseName: expense_tracker_db
    user: expenseflow

services:
  - type: web
    name: expenseflow
    plan: free
    buildCommand: |
      cd client && npm install && npm run build &&
      cd ../server && npm install && npx prisma generate &&
      cp -r ../client/dist ./public
    startCommand: cd server && npx prisma db push --accept-data-loss && node prisma/seed.js; node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        value: re_dckNWcK1_FAp8wHFA2eY75Z6koMdXsZei
      - key: FRONTEND_URL
        value: https://expenseflow.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: expenseflow-db
          property: connectionString
